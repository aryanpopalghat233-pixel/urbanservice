<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeService Pro | Quality Services at Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50">

    <nav class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="text-2xl font-bold text-blue-600 tracking-tight">HomeService<span class="text-gray-800">Pro</span></div>
            <div class="hidden md:flex space-x-8 font-medium text-gray-600">
                <a href="#" class="hover:text-blue-600">Home</a>
                <a href="#" class="hover:text-blue-600">My Bookings</a>
                <a href="#" class="hover:text-blue-600">Help</a>
            </div>
            <button class="bg-black text-white px-5 py-2 rounded-lg font-medium">Login / Sign Up</button>
        </div>
    </nav>

    <section class="bg-white py-12 border-b">
        <div class="max-w-4xl mx-auto text-center px-4">
            <h1 class="text-4xl md:text-5xl font-bold text-gray-900 mb-6">Home services, on demand.</h1>
            <div class="relative max-w-xl mx-auto">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-4 text-gray-400"></i>
                <input type="text" placeholder="Search for 'AC Repair', 'Cleaning'..." class="w-full pl-12 pr-4 py-4 border rounded-xl shadow-sm focus:ring-2 focus:ring-blue-500 outline-none text-lg">
            </div>
        </div>
    </section>

<main class="max-w-6xl mx-auto px-4 py-8">
    <h2 class="text-2xl font-bold mb-6 text-gray-800">Available Services</h2>
    
    <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-12">
        
        <div class="logo-card group" onclick="startBooking('AC Repair')">
            <div class="logo-wrapper bg-blue-50 text-blue-600">
                <i class="fa-solid fa-snowflake text-3xl"></i>
            </div>
            <h3 class="font-bold text-gray-700 text-sm mt-3">AC Repair</h3>
            <p class="text-xs text-gray-400">Expert cooling help</p>
        </div>

        <div class="logo-card group" onclick="startBooking('Cleaning')">
            <div class="logo-wrapper bg-green-50 text-green-600">
                <i class="fa-solid fa-broom text-3xl"></i>
            </div>
            <h3 class="font-bold text-gray-700 text-sm mt-3">Deep Cleaning</h3>
            <p class="text-xs text-gray-400">Sparkling homes</p>
        </div>

        <div class="logo-card group" onclick="startBooking('Electrician')">
            <div class="logo-wrapper bg-yellow-50 text-yellow-600">
                <i class="fa-solid fa-bolt text-3xl"></i>
            </div>
            <h3 class="font-bold text-gray-700 text-sm mt-3">Electrician</h3>
            <p class="text-xs text-gray-400">Wiring & Fixes</p>
        </div>

        <div class="logo-card group" onclick="startBooking('Plumbing')">
            <div class="logo-wrapper bg-red-50 text-red-600">
                <i class="fa-solid fa-faucet-drip text-3xl"></i>
            </div>
            <h3 class="font-bold text-gray-700 text-sm mt-3">Plumbing</h3>
            <p class="text-xs text-gray-400">Leak & Pipe repair</p>
        </div>

    </div>

    <div id="tracking-container" class="hidden">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-bold text-gray-800">Live Professional Tracking</h2>
            <button onclick="document.getElementById('tracking-container').classList.add('hidden')" class="text-gray-400 hover:text-red-500"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="bg-white rounded-2xl shadow-2xl overflow-hidden border border-gray-100">
            <div id="map"></div> 
            <div class="p-5 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center font-bold">P</div>
                    <div>
                        <p class="text-xs text-gray-400 font-bold uppercase">Assigned Pro</p>
                        <p class="font-bold text-gray-800" id="worker-name">Locating...</p>
                    </div>
                </div>
                <button class="bg-blue-600 text-white px-5 py-2 rounded-xl text-sm font-bold shadow-lg hover:bg-blue-700">Call Now</button>
            </div>
        </div>
    </div>
</main>


    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
