<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeService Pro | Quality Services at Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50">

    <nav class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="text-2xl font-bold text-blue-600 tracking-tight">HomeService<span class="text-gray-800">Pro</span></div>
            <div class="hidden md:flex space-x-8 font-medium text-gray-600">
                <a href="#" class="hover:text-blue-600">Home</a>
                <a href="#" class="hover:text-blue-600">My Bookings</a>
                <a href="#" class="hover:text-blue-600">Help</a>
            </div>
            <button class="bg-black text-white px-5 py-2 rounded-lg font-medium">Login / Sign Up</button>
        </div>
    </nav>

    <section class="bg-white py-12 border-b">
        <div class="max-w-4xl mx-auto text-center px-4">
            <h1 class="text-4xl md:text-5xl font-bold text-gray-900 mb-6">Home services, on demand.</h1>
            <div class="relative max-w-xl mx-auto">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-4 text-gray-400"></i>
                <input type="text" placeholder="Search for 'AC Repair', 'Cleaning'..." class="w-full pl-12 pr-4 py-4 border rounded-xl shadow-sm focus:ring-2 focus:ring-blue-500 outline-none text-lg">
            </div>
        </div>
    </section>

<main class="max-w-6xl mx-auto px-4 py-8">
    <h2 class="text-2xl font-bold mb-6 text-gray-900">Recommended Services</h2>
    
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-12">
        
        <div class="medium-card group" onclick="startBooking('AC Repair')">
            <div class="medium-image-wrapper">
                <img src="https://images.unsplash.com/photo-1590756254933-2873d72a83b6?auto=format&fit=crop&q=80&w=400" alt="AC">
            </div>
            <div class="p-3">
                <h3 class="font-bold text-gray-800 text-sm">AC Repair</h3>
                <p class="text-xs text-gray-500">Starts at $29</p>
            </div>
        </div>

        <div class="medium-card group" onclick="startBooking('Cleaning')">
            <div class="medium-image-wrapper">
                <img src="https://images.unsplash.com/photo-1581578731548-c64695cc6958?auto=format&fit=crop&q=80&w=400" alt="Cleaning">
            </div>
            <div class="p-3">
                <h3 class="font-bold text-gray-800 text-sm">Home Cleaning</h3>
                <p class="text-xs text-gray-500">Starts at $49</p>
            </div>
        </div>

        <div class="medium-card group" onclick="startBooking('Electrician')">
            <div class="medium-image-wrapper">
                <img src="https://images.unsplash.com/photo-1621905251189-08b45d6a269e?auto=format&fit=crop&q=80&w=400" alt="Electrician">
            </div>
            <div class="p-3">
                <h3 class="font-bold text-gray-800 text-sm">Electricians</h3>
                <p class="text-xs text-gray-500">Starts at $19</p>
            </div>
        </div>

        <div class="medium-card group" onclick="startBooking('Plumbing')">
            <div class="medium-image-wrapper">
                <img src="https://images.unsplash.com/photo-1504148455328-c376907d081c?auto=format&fit=crop&q=80&w=400" alt="Plumbing">
            </div>
            <div class="p-3">
                <h3 class="font-bold text-gray-800 text-sm">Plumbing</h3>
                <p class="text-xs text-gray-500">Starts at $25</p>
            </div>
        </div>
    </div>

    <div id="tracking-container" class="hidden transition-all duration-500">
        <h2 class="text-2xl font-bold mb-4">Live Tracking</h2>
        <div class="bg-white rounded-xl shadow-lg overflow-hidden border border-gray-200">
            <div id="map"></div> 
            <div class="p-4 bg-gray-50 border-t flex items-center justify-between">
                <div>
                    <p class="text-xs text-gray-400 uppercase font-bold">Technician</p>
                    <p class="font-bold text-blue-600" id="worker-name">Searching...</p>
                </div>
                <button class="bg-green-500 text-white px-4 py-2 rounded-lg text-sm font-bold">Call Pro</button>
            </div>
        </div>
    </div>
</main>


    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
