<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ServicePro | Home Services</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-white">

    <nav class="bg-white border-b sticky top-0 z-[1000] py-4">
        <div class="max-w-6xl mx-auto px-4 flex items-center justify-between">
            <div class="flex items-center gap-6">
                <div class="text-2xl font-black text-gray-900 tracking-tighter">Service<span class="text-blue-600">Pro</span></div>
                <div class="hidden md:flex items-center gap-2 text-sm font-semibold text-gray-500 border-l pl-6">
                    <i class="fa-solid fa-location-dot text-blue-600"></i>
                    <span>Pune, Maharashtra</span>
                    <i class="fa-solid fa-chevron-down text-[10px]"></i>
                </div>
            </div>
            <div class="hidden md:flex space-x-8 text-sm font-bold text-gray-700 uppercase tracking-wide">
                <a href="#" class="hover:text-blue-600">Blog</a>
                <a href="#" class="hover:text-blue-600">Register as a Pro</a>
                <a href="#" class="hover:text-blue-600">Login / Sign Up</a>
            </div>
        </div>
    </nav>

    <header class="py-12 bg-white text-center">
        <h1 class="text-4xl md:text-5xl font-bold text-gray-900 mb-8">Home services, on demand.</h1>
        <div class="max-w-2xl mx-auto px-4 relative">
            <i class="fa-solid fa-magnifying-glass absolute left-8 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input type="text" placeholder="Search for 'AC Repair'..." class="w-full pl-12 pr-4 py-4 border border-gray-200 rounded-xl shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 text-lg">
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 pb-32">
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
            
            <div class="uc-card" onclick="openTracking('AC Repair', '4.8', '29')">
                <div class="uc-icon bg-blue-50 text-blue-600"><i class="fa-solid fa-snowflake"></i></div>
                <div class="mt-4 text-center">
                    <h3 class="font-bold text-gray-800">AC Repair</h3>
                    <div class="flex items-center justify-center gap-1 mt-1">
                        <span class="text-xs font-bold text-yellow-600">★ 4.8</span>
                        <span class="text-[10px] text-gray-400">(12k)</span>
                    </div>
                </div>
            </div>

            <div class="uc-card" onclick="openTracking('Cleaning', '4.9', '45')">
                <div class="uc-icon bg-green-50 text-green-600"><i class="fa-solid fa-broom"></i></div>
                <div class="mt-4 text-center">
                    <h3 class="font-bold text-gray-800">Cleaning</h3>
                    <div class="flex items-center justify-center gap-1 mt-1">
                        <span class="text-xs font-bold text-yellow-600">★ 4.9</span>
                        <span class="text-[10px] text-gray-400">(25k)</span>
                    </div>
                </div>
            </div>

            <div class="uc-card" onclick="openTracking('Electrician', '4.7', '15')">
                <div class="uc-icon bg-yellow-50 text-yellow-600"><i class="fa-solid fa-bolt"></i></div>
                <div class="mt-4 text-center">
                    <h3 class="font-bold text-gray-800">Electrician</h3>
                    <div class="flex items-center justify-center gap-1 mt-1">
                        <span class="text-xs font-bold text-yellow-600">★ 4.7</span>
                        <span class="text-[10px] text-gray-400">(18k)</span>
                    </div>
                </div>
            </div>

            <div class="uc-card" onclick="openTracking('Plumbing', '4.6', '20')">
                <div class="uc-icon bg-red-50 text-red-600"><i class="fa-solid fa-faucet"></i></div>
                <div class="mt-4 text-center">
                    <h3 class="font-bold text-gray-800">Plumbing</h3>
                    <div class="flex items-center justify-center gap-1 mt-1">
                        <span class="text-xs font-bold text-yellow-600">★ 4.6</span>
                        <span class="text-[10px] text-gray-400">(10k)</span>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <div id="tracking-drawer" class="fixed bottom-0 left-0 right-0 z-[2000] transform translate-y-full transition-transform duration-500 ease-in-out">
        <div class="max-w-2xl mx-auto bg-white rounded-t-3xl shadow-[0_-10px_40px_rgba(0,0,0,0.15)] overflow-hidden border">
            <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto my-3"></div>
            
            <div class="px-6 pb-6">
                <div class="flex justify-between items-center mb-4">
                    <div>
                        <h2 id="tracking-service-name" class="text-xl font-bold text-gray-900">Service Tracking</h2>
                        <p id="tracking-status" class="text-sm text-green-600 font-medium">Assigning a professional...</p>
                    </div>
                    <button onclick="closeTracking()" class="text-gray-400 hover:text-gray-600 text-xl"><i class="fa-solid fa-circle-xmark"></i></button>
                </div>

                <div id="map" class="w-full h-64 rounded-2xl border"></div>

                <div class="mt-4 flex items-center justify-between bg-gray-50 p-4 rounded-xl">
                    <div class="flex items-center gap-3">
                        <div class="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center text-white text-xl font-bold">JD</div>
                        <div>
                            <p class="text-xs text-gray-400 font-bold uppercase">Professional</p>
                            <p class="font-bold text-gray-800" id="worker-name-display">John Doe</p>
                        </div>
                    </div>
                    <button class="bg-black text-white px-6 py-2 rounded-lg font-bold flex items-center gap-2">
                        <i class="fa-solid fa-phone"></i> Call
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
